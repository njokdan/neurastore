services:
  neurastore:
    # No direct host port when Caddy is terminating TLS in front --
    # otherwise the plain-HTTP port would still be reachable directly,
    # bypassing TLS entirely. Caddy reaches this service over the
    # internal Docker network via its service name, which works
    # regardless of whether a host port is published.
    ports: []

  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80" # needed for Let's Encrypt's HTTP-01 challenge in real deployments; harmless for local testing
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      neurastore:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
