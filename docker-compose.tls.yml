services:
  neurastore:
    # Docker Compose merges list-type fields (like `ports`) across
    # override files by default -- it does NOT replace them. A plain
    # `ports: []` here would just merge an empty list into the base
    # file's `ports: ["8080:8080"]`, which has zero effect (verified:
    # it didn't work). `!reset` explicitly tells Compose to clear the
    # merged list instead of appending to it -- this is what actually
    # removes the direct host port when TLS-terminating through Caddy.
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80" # needed for Let's Encrypt's HTTP-01 challenge in real deployments; harmless for local testing
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      neurastore:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
